# Modular Docker Compose Service Library
#
# This is the master docker-compose file for the Jahia test environment.
# It defines shared infrastructure (networks) that all included services attach to.
#
# USAGE:
#   An external composition tool reads service files from ./services/ and generates
#   the `include:` section below based on user selections. You can also manually
#   add include directives for the services you need.
#
# REQUIREMENTS:
#   - Docker Compose v2.20+ (for `include` support)
#   - A .env file with required environment variables (see README.md)
#
# EXAMPLE (generated by the composition tool):
#   include:
#     - path: ./services/jahia.yml
#     - path: ./services/postgres-18.yml
#     - path: ./services/cypress.yml
#
# The `include` directive below is a placeholder. The composition tool will
# replace it with the user's selected services.
# ---------------------------------------------------------------------------

# include:
#   - path: ./services/jahia.yml

networks:
  stack:
