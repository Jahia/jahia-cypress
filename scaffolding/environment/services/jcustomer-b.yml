services:
  jcustomer-b:
    image: "${J_JCUSTOMER_IMAGE}"
    container_name: jcustomer-b
    hostname: jcustomer-b.jahia.net
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 3gb
        reservations:
          memory: 2gb
    networks:
      stack:
        ipv4_address: 172.31.24.101
    ports:
      - 28181:8181
      - 29443:9443
      - 25005:5005
      - 28102:8102
    environment:
      UNOMI_ELASTICSEARCH_ADDRESSES: elasticsearch:9200
      UNOMI_ELASTICSEARCH_CLUSTERNAME: docker-cluster
      UNOMI_ELASTICSEARCH_USERNAME: ${J_ELASTICSEARCH_ELASTIC_USERNAME}
      UNOMI_ELASTICSEARCH_PASSWORD: ${J_ELASTICSEARCH_ELASTIC_PASSWORD}
      UNOMI_CLUSTER_PUBLIC_ADDRESS: https://jcustomer-b.jahia.net:28181
      UNOMI_CLUSTER_INTERNAL_ADDRESS: https://jcustomer-b.jahia.net:29443
      JAVA_MAX_MEM: 2G
      UNOMI_ROOT_PASSWORD: ${J_JCUSTOMER_UNOMI_ROOT_PASSWORD}
      UNOMI_HAZELCAST_TCPIP_MEMBERS: 172.31.24.100-102
      UNOMI_THIRDPARTY_PROVIDER1_KEY: 670c26d1cc413346c3b2fd9ce65dab41
      UNOMI_THIRDPARTY_PROVIDER1_IPADDRESSES: 172.31.24.0/24,::1,127.0.0.1
      KARAF_OPTS: "-Dunomi.autoStart=true"
      MAXMIND_KEY: ${J_JCUSTOMER_MAXMIND_KEY}
      JCUSTOMER_DEBUG: true
