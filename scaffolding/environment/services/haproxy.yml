x-metadata:
  name: "HAProxy Load Balancer"
  description: "HAProxy load balancer for distributing traffic across Jahia cluster nodes."
  group: "infrastructure"
  requires:
    - group: "cluster"
  notes: |
    HAProxy requires a configuration file. The composition tool should ensure
    an haproxy/ directory exists with an appropriate haproxy.cfg file.

services:
  haproxy:
    image: haproxy:latest
    container_name: haproxy
    hostname: haproxy
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - stack
    ports:
      - "8090:80"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
