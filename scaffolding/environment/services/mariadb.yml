x-metadata:
  name: "MariaDB 10"
  description: "MariaDB 10 database server for Jahia content storage. Includes optimized settings for Jahia workloads."
  group: "database"
  requires: []
  prompt_env:
    - JCLI_MARIADB_IMAGE

services:
  mariadb:
    image: ${JCLI_MARIADB_IMAGE}
    container_name: mariadb
    hostname: mariadb
    deploy:
      resources:
        limits:
          memory: 1gb
    networks:
      - stack
    command: --max_allowed_packet=1073741824 --transaction-isolation=READ-UNCOMMITTED --innodb-lock-wait-timeout=10
    environment:
      MYSQL_ROOT_PASSWORD: ${JCLI_SECRET_MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${JCLI_MARIADB_DATABASE}
      MYSQL_USER: ${JCLI_SECRET_MARIADB_USER}
      MYSQL_PASSWORD: ${JCLI_SECRET_MARIADB_PASSWORD}
