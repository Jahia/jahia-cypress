x-metadata:
  name: "PostgreSQL"
  description: "PostgreSQL database server for Jahia content storage."
  group: "database"
  requires: []
  prompt_env:
    - JCLI_POSTGRES_IMAGE

services:
  database:
    image: "${JCLI_POSTGRES_IMAGE:-postgres:18-alpine}"
    container_name: database
    hostname: database
    networks:
      - stack
    environment:
      POSTGRES_DB: ${JCLI_POSTGRES_DB:-jahia}
      POSTGRES_USER: ${JCLI_POSTGRES_USER:-jahia}
      POSTGRES_PASSWORD: ${JCLI_SECRET_POSTGRES_PASSWORD:-jahia}
