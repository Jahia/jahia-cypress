x-metadata:
  name: "Jahia Processing Node"
  description: "Core Jahia CMS processing server. Handles content authoring and background jobs."
  group: "core"
  requires: []

services:
  jahia:
    image: "${JCLI_JAHIA_IMAGE}"
    container_name: jahia
    hostname: jahia
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 6gb
        reservations:
          memory: 4gb
    networks:
      - stack
    ports:
      - "8080:8080"
      - "8101:8101"
      - "8000:8000"
    extra_hosts:
      - jahia:127.0.0.1
    environment:
      jahia_cfg_karaf_remoteShellHost: 0.0.0.0
      DB_VENDOR: ${JCLI_JAHIA_DB_VENDOR}
      DB_HOST: ${JCLI_JAHIA_DB_HOST}
      DB_NAME: ${JCLI_JAHIA_DB_NAME}
      DB_USER: ${JCLI_SECRET_JAHIA_DB_USER}
      DB_PASS: ${JCLI_SECRET_JAHIA_DB_PASS}
      JAHIA_LICENSE: ${JCLI_JAHIA_LICENSE}
      SUPER_USER_PASSWORD: ${JCLI_SECRET_JAHIA_SUPER_USER_PASSWORD}
      CLUSTER_ENABLED: "${JCLI_JAHIA_CLUSTER_ENABLED}"
      PROCESSING_SERVER: "true"
      MAX_RAM_PERCENTAGE: 80
      RESTORE_MODULE_STATES: "false"
      NEXUS_USERNAME: ${JCLI_SECRET_JAHIA_NEXUS_USERNAME}
      NEXUS_PASSWORD: ${JCLI_SECRET_JAHIA_NEXUS_PASSWORD}
      JPDA: "true"
