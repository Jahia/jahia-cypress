x-metadata:
  name: "Jahia Browsing Node A"
  description: "First Jahia browsing/cluster node for read-only content delivery."
  group: "cluster"
  requires:
    - service: "jahia"
    - group: "database"

services:
  jahia-browsing-a:
    image: "${JCLI_JAHIA_IMAGE:-jahia/jahia-ee:8}"
    container_name: jahia-browsing-a
    hostname: jahia-browsing-a
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 6gb
        reservations:
          memory: 4gb
    networks:
      - stack
    ports:
      - "8081:8080"
      - "8102:8101"
    environment:
      jahia_cfg_karaf_remoteShellHost: 0.0.0.0
      DB_VENDOR: ${JCLI_JAHIA_DB_VENDOR:-postgresql}
      DB_HOST: ${JCLI_JAHIA_DB_HOST:-database}
      DB_NAME: ${JCLI_JAHIA_DB_NAME:-jahia}
      DB_USER: ${JCLI_JAHIA_DB_USER:-jahia}
      DB_PASS: ${JCLI_JAHIA_DB_PASS:-jahia}
      JAHIA_LICENSE: ${JCLI_JAHIA_LICENSE:-}
      SUPER_USER_PASSWORD: ${JCLI_SECRET_JAHIA_SUPER_USER_PASSWORD:-root1234}
      CLUSTER_ENABLED: "true"
      PROCESSING_SERVER: "false"
      PROCESSING_HOST: "jahia"
      MAX_RAM_PERCENTAGE: 80
      RESTORE_MODULE_STATES: "false"
