x-metadata:
  name: "JCustomer Node C"
  description: "JCustomer Cluster Node C"
  optional: true

services:
  jcustomer-c:
    image: "${JCLI_JCUSTOMER_IMAGE}"
    container_name: jcustomer-c
    hostname: jcustomer-c.jahia.net
    restart: "no"
    deploy:
      resources:
        limits:
          memory: 3gb
        reservations:
          memory: 2gb
    networks:
      - stack:
        ipv4_address: 172.31.24.102
    ports:
      - 28181:8181
      - 29443:9443
      - 25005:5005
      - 28102:8102
    environment:
      UNOMI_ELASTICSEARCH_ADDRESSES: elasticsearch:9200
      UNOMI_ELASTICSEARCH_CLUSTERNAME: docker-cluster
      UNOMI_ELASTICSEARCH_USERNAME: ${JCLI_SECRET_ELASTICSEARCH_ELASTIC_USERNAME}
      UNOMI_ELASTICSEARCH_PASSWORD: ${JCLI_SECRET_ELASTICSEARCH_ELASTIC_PASSWORD}
      UNOMI_CLUSTER_PUBLIC_ADDRESS: https://jcustomer-c.jahia.net:8181
      UNOMI_CLUSTER_INTERNAL_ADDRESS: https://jcustomer-c.jahia.net:9443
      JAVA_MAX_MEM: 2G
      UNOMI_ROOT_PASSWORD: ${JCLI_SECRET_JCUSTOMER_UNOMI_ROOT_PASSWORD}
      UNOMI_HAZELCAST_TCPIP_MEMBERS: 172.31.24.100-102
      UNOMI_THIRDPARTY_PROVIDER1_KEY: 670c26d1cc413346c3b2fd9ce65dab41
      UNOMI_THIRDPARTY_PROVIDER1_IPADDRESSES: 172.31.24.0/24,::1,127.0.0.1
      KARAF_OPTS: "-Dunomi.autoStart=true"
      MAXMIND_KEY: ${JCLI_SECRET_JCUSTOMER_MAXMIND_KEY}
      JCUSTOMER_DEBUG: true
